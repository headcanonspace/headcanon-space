# Deploy static export (out/) to cPanel over FTP
# Set GitHub repository secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# If your FTP user is already chrooted to public_html, set server-dir to ./ in the with: block below.

name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and export static site
        run: npm run build

      - name: Verify export output
        run: test -f out/index.html

      - name: Upload /out to cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # Must match the domain’s real web root on the host (not a similarly named folder).
          # headcanonspace.com document root → headcanonspace.com/public_html
          server-dir: ./headcanonspace.com/public_html/
          log-level: standard

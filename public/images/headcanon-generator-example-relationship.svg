<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <!-- Background: site surface color #ffffff -->
  <rect width="400" height="250" rx="16" fill="#ffffff"/>
  <!-- Outer border -->
  <rect width="398" height="248" x="1" y="1" rx="15" fill="none" stroke="#e8eaed" stroke-width="1.5"/>
  <!-- Top accent bar primary -->
  <rect width="400" height="4" rx="0" fill="#6366f1"/>

  <!-- Type label -->
  <rect width="116" height="22" x="28" y="24" rx="11" fill="#eef2ff" stroke="#6366f199" stroke-width="1"/>
  <circle cx="40" cy="35" r="2.5" fill="#6366f1"/>
  <text x="55" y="39" font-family="DM Sans, Arial, sans-serif" font-size="10" fill="#6366f1" font-weight="600" letter-spacing="0.8">RELATIONSHIP</text>

  <!-- Character names -->
  <text x="28" y="78" font-family="DM Serif Display, Georgia, serif" font-size="22" fill="#0a0e1a" letter-spacing="-0.5">Kael &amp; Mira</text>

  <!-- Divider -->
  <rect width="344" height="1" x="28" y="88" fill="#e8eaed"/>

  <!-- Headcanon body text -->
  <text x="28" y="114" font-family="DM Sans, Arial, sans-serif" font-size="13.5" fill="#2d3142">
    <tspan x="28" dy="0">Kael always remembers exactly how Mira</tspan>
    <tspan x="28" dy="21">takes her coffee - even years after they had</tspan>
    <tspan x="28" dy="21">stopped talking. Old habits, he tells himself.</tspan>
    <tspan x="28" dy="21">He knows that is not the reason.</tspan>
  </text>

  <!-- Footer rule -->
  <rect width="344" height="1" x="28" y="200" fill="#e8eaed"/>

  <!-- Footer label -->
  <text x="28" y="220" font-family="DM Sans, Arial, sans-serif" font-size="11" fill="#8c93a3" letter-spacing="0.3">Ship Dynamic</text>
  <text x="372" y="220" font-family="DM Sans, Arial, sans-serif" font-size="10" fill="#8c93a3" text-anchor="end">headcanon.space</text>

  <!-- Decorative large quote mark -->
  <text x="355" y="100" font-family="DM Serif Display, Georgia, serif" font-size="72" fill="#6366f1" opacity="0.08" text-anchor="end">"</text>
</svg>

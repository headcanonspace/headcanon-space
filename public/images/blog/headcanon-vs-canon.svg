<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
      <!-- Diagonal Split Background -->
      <polygon points="0,0 600,0 400,630 0,630" fill="#0f172a" />
      <polygon points="600,0 1200,0 1200,630 400,630" fill="#f8fafc" />
      <line x1="600" y1="0" x2="400" y2="630" stroke="#4f46e5" stroke-width="8" />

      <!-- Left Side (Canon - Formal/Rigid) -->
      <g transform="translate(100, 250)">
        <rect x="0" y="-80" width="220" height="300" fill="#334155" stroke="#ffffff" stroke-width="4" rx="4" />
        <rect x="20" y="-60" width="180" height="260" fill="none" stroke="#ffffff" stroke-width="2" />
        <text x="110" y="20" font-family="serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">CANON</text>
        <line x1="40" y1="50" x2="180" y2="50" stroke="#c7d2fe" stroke-width="4" />
        <line x1="60" y1="70" x2="160" y2="70" stroke="#c7d2fe" stroke-width="4" />
      </g>

      <!-- Right Side (Headcanon - Creative/Floating) -->
      <g transform="translate(750, 150) rotate(8)">
        <rect x="10" y="10" width="320" height="240" fill="#0f172a" rx="120" />
        <rect x="0" y="0" width="320" height="240" fill="#4f46e5" stroke="#0f172a" stroke-width="4" rx="120" />
        <path d="M60 200 L20 280 L100 220 Z" fill="#4f46e5" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
        <path d="M60 200 L20 280 L100 220 Z" fill="#4f46e5" /> <!-- hide stroke overlap -->
        
        <text x="160" y="130" font-family="serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">HEADCANON</text>
      </g>
      
      <!-- Sparkles on the creative side -->
      
    <g transform="translate(1050, 120) scale(1.2)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#e11d48" />
    </g>
  
      
    <g transform="translate(720, 420) scale(0.8)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#4f46e5" />
    </g>
  

      <!-- Center VS Badge -->
      <g transform="translate(500, 315)">
        <circle cx="0" cy="0" r="70" fill="#0f172a" stroke="#ffffff" stroke-width="8" />
        <text x="0" y="22" font-family="sans-serif" font-size="64" font-style="italic" font-weight="900" fill="#ffffff" text-anchor="middle">VS</text>
      </g>
    </svg>
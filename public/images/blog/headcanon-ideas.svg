<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="1200" height="630" fill="#0f172a" />
      
      <!-- Abstract Grid Background -->
      <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="1" opacity="0.5"/>
      </pattern>
      <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" />

      <!-- Center Title Card -->
      <g transform="translate(150, 150)">
        <rect x="15" y="15" width="900" height="330" fill="#4f46e5" rx="24" />
        <rect x="0" y="0" width="900" height="330" fill="#ffffff" stroke="#4f46e5" stroke-width="6" rx="24" />
        
        <!-- Bulb Icon -->
        <g transform="translate(450, 80) scale(1.5)">
           <circle cx="0" cy="0" r="30" fill="#c7d2fe" />
           <text x="0" y="8" font-family="sans-serif" font-size="24" text-anchor="middle">💡</text>
        </g>
        
        <text x="450" y="180" font-family="serif" font-size="64" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="-1">50 Headcanon Ideas for</text>
        <text x="450" y="250" font-family="serif" font-size="64" font-weight="900" fill="#4f46e5" text-anchor="middle" letter-spacing="-1">Any Character or Fandom</text>
      </g>

      <!-- Decorative Elements -->
      
    <g transform="translate(200, 100) scale(1.5)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#e11d48" />
    </g>
  
      
    <g transform="translate(1000, 500) scale(2)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#c7d2fe" />
    </g>
  
      
    <g transform="translate(150, 480) scale(1)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#ffffff" />
    </g>
  
    </svg>
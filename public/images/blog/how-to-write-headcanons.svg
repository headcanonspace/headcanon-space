<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="1200" height="630" fill="#f8fafc" />
      
      <!-- Background pattern (dots) -->
      <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="2" fill="#c7d2fe" />
      </pattern>
      <rect x="0" y="0" width="1200" height="630" fill="url(#dots)" opacity="0.5" />

      <!-- Document Mockup (Left) -->
      
    <g transform="translate(120, 100) rotate(-4)">
      <!-- Shadow -->
      <rect x="12" y="12" width="340" height="420" fill="#0f172a" rx="8" />
      <!-- Paper -->
      <rect x="0" y="0" width="340" height="420" fill="#ffffff" stroke="#0f172a" stroke-width="4" rx="8" />
      
      <!-- Lines of text -->
      <rect x="40" y="60" width="260" height="16" fill="#0f172a" rx="4" />
      <rect x="40" y="100" width="220" height="12" fill="#334155" rx="4" />
      <rect x="40" y="130" width="240" height="12" fill="#334155" rx="4" />
      <rect x="40" y="160" width="180" height="12" fill="#334155" rx="4" />
      
      <!-- Graphic block -->
      <rect x="40" y="210" width="260" height="120" fill="#c7d2fe" stroke="#4f46e5" stroke-width="4" rx="8" />
      <circle cx="170" cy="270" r="30" fill="#ffffff" />
      
    <g transform="translate(170, 270) scale(0.8)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#4f46e5" />
    </g>
  
      
      <rect x="40" y="360" width="200" height="12" fill="#334155" rx="4" />
    </g>
  

      <!-- Sticky Note (Right overlapping) -->
      <g transform="translate(380, 340) rotate(6)">
        <rect x="8" y="8" width="220" height="220" fill="#0f172a" rx="4" />
        <rect x="0" y="0" width="220" height="220" fill="#4f46e5" stroke="#0f172a" stroke-width="4" rx="4" />
        <text x="30" y="50" font-family="monospace" font-size="24" font-weight="bold" fill="#ffffff">Idea:</text>
        <line x1="30" y1="90" x2="190" y2="90" stroke="#ffffff" stroke-width="4" stroke-dasharray="10,10" />
        <line x1="30" y1="130" x2="160" y2="130" stroke="#ffffff" stroke-width="4" stroke-dasharray="10,10" />
        <line x1="30" y1="170" x2="180" y2="170" stroke="#ffffff" stroke-width="4" stroke-dasharray="10,10" />
      </g>

      <!-- Sparkles -->
      
    <g transform="translate(100, 150) scale(1.5)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#e11d48" />
    </g>
  
      
    <g transform="translate(520, 120) scale(1)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#4f46e5" />
    </g>
  

      <!-- Right Side Typography -->
      <g transform="translate(620, 260)">
        <text x="0" y="0" font-family="serif" font-size="85" font-weight="900" fill="#0f172a" letter-spacing="-2">How to Write</text>
        <text x="0" y="90" font-family="serif" font-size="85" font-weight="900" fill="#4f46e5" letter-spacing="-2">Headcanons</text>
        
        <rect x="0" y="140" width="120" height="40" fill="#0f172a" rx="20" />
        <text x="60" y="165" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">TUTORIAL</text>
      </g>
    </svg>
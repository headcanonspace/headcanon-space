<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="1200" height="630" fill="#0f172a" />
      
      <!-- Huge abstract background text -->
      <text x="600" y="380" font-family="serif" font-size="280" font-weight="900" fill="#334155" opacity="0.2" text-anchor="middle">DEFINE</text>

      <!-- The Definition Card -->
      <g transform="translate(250, 140)">
        <!-- Shadow -->
        <rect x="15" y="15" width="700" height="350" fill="#4f46e5" rx="16" />
        <!-- Card -->
        <rect x="0" y="0" width="700" height="350" fill="#ffffff" stroke="#4f46e5" stroke-width="6" rx="16" />
        
        <!-- Header -->
        <text x="60" y="100" font-family="serif" font-size="72" font-weight="900" fill="#0f172a" letter-spacing="-2">Headcanon</text>
        <text x="60" y="140" font-family="monospace" font-size="22" font-weight="bold" fill="#4f46e5">[hed-kan-uhn] • noun</text>
        
        <line x1="60" y1="180" x2="640" y2="180" stroke="#c7d2fe" stroke-width="4" stroke-dasharray="12,12" />
        
        <!-- Highlighted Definition Bar -->
        <rect x="60" y="210" width="580" height="80" fill="#c7d2fe" rx="8" />
        <rect x="60" y="210" width="8" height="80" fill="#4f46e5" />
        <text x="90" y="258" font-family="sans-serif" font-size="28" font-weight="bold" fill="#0f172a">A fan's personal interpretation</text>
      </g>

      <!-- Floating Elements -->
      <g transform="translate(850, 80) rotate(15)">
        <rect x="0" y="0" width="160" height="60" fill="#e11d48" stroke="#ffffff" stroke-width="4" rx="30" />
        <text x="80" y="38" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Concept</text>
      </g>
      
      
    <g transform="translate(200, 100) scale(1.5)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#ffffff" />
    </g>
  
      
    <g transform="translate(950, 450) scale(2)">
      <path d="M0 -20 Q0 0 20 0 Q0 0 0 20 Q0 0 -20 0 Q0 0 0 -20" fill="#c7d2fe" />
    </g>
  
      
      <!-- Footer Badge -->
      <rect x="80" y="520" width="150" height="40" fill="#ffffff" fill-opacity="0.1" rx="20" />
      <text x="155" y="546" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">FANDOM WIKI</text>
    </svg>